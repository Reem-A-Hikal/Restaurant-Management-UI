<!-- Header -->
<div class="manage-modal__header">
  <div class="manage-modal__title-block">
    <div class="manage-modal__icon">
      <i class="bi bi-tags-fill"></i>
    </div>
    <h5 class="manage-modal__title">{{ title }}</h5>
  </div>
  <button class="manage-modal__close" (click)="modalRef.close()">
    <i class="bi bi-x-lg"></i>
  </button>
</div>

<!-- Body -->
<div class="manage-modal__body">
  <form [formGroup]="categoryForm" (ngSubmit)="onSubmit()">

    <!-- Name -->
    <div class="form-field" [class.form-field--error]="categoryForm.get('name')?.touched && categoryForm.get('name')?.invalid">
      <label class="form-field__label" for="name">Category Name</label>
      <div class="form-field__input-wrap">
        <i class="bi bi-card-text form-field__icon"></i>
        <input
          class="form-field__input"
          type="text"
          id="name"
          formControlName="name"
          placeholder="e.g. Main Course"
        />
      </div>
      <div class="form-field__error" *ngIf="categoryForm.get('name')?.touched && categoryForm.get('name')?.invalid">
        <i class="bi bi-exclamation-circle"></i>
        <span *ngIf="categoryForm.get('name')?.errors?.['required']">Name is required</span>
        <span *ngIf="categoryForm.get('name')?.errors?.['minlength']">Minimum 3 characters</span>
        <span *ngIf="categoryForm.get('name')?.errors?.['maxlength']">Max 50 characters</span>
      </div>
    </div>

    <!-- Status -->
    <div class="form-field" [class.form-field--error]="categoryForm.get('status')?.touched && categoryForm.get('status')?.invalid">
      <label class="form-field__label" for="status">Status</label>
      <div class="form-field__input-wrap">
        <i class="bi bi-toggle-on form-field__icon"></i>
        <select class="form-field__input form-field__select" id="status" formControlName="status">
          <option *ngFor="let option of statusOptions" [value]="option.value">
            {{ option.label }}
          </option>
        </select>
        <i class="bi bi-chevron-down form-field__chevron"></i>
      </div>
    </div>

    <!-- Display Order -->
    <div class="form-field" [class.form-field--error]="categoryForm.get('displayOrder')?.touched && categoryForm.get('displayOrder')?.invalid">
      <label class="form-field__label" for="displayOrder">Display Order</label>
      <div class="form-field__input-wrap">
        <i class="bi bi-sort-numeric-down form-field__icon"></i>
        <input
          class="form-field__input"
          type="number"
          id="displayOrder"
          formControlName="displayOrder"
          placeholder="1"
        />
      </div>
      <div class="form-field__error" *ngIf="categoryForm.get('displayOrder')?.touched && categoryForm.get('displayOrder')?.invalid">
        <i class="bi bi-exclamation-circle"></i>
        <span *ngIf="categoryForm.get('displayOrder')?.errors?.['required']">Display Order is required</span>
        <span *ngIf="categoryForm.get('displayOrder')?.errors?.['min']">Minimum value is 1</span>
      </div>
    </div>

    <!-- Actions -->
    <div class="manage-modal__actions">
      <button type="button" class="btn-cancel" (click)="modalRef.close()">
        Cancel
      </button>
      <button type="submit" class="btn-save" [disabled]="categoryForm.invalid || isSubmitting">
        <span *ngIf="isSubmitting" class="spinner"></span>
        <i *ngIf="!isSubmitting" class="bi bi-check-lg"></i>
        {{ isSubmitting ? 'Saving...' : 'Save Category' }}
      </button>
    </div>

  </form>
</div>
