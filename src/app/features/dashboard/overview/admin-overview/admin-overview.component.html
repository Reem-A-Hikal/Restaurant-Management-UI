<div class="container my-4 dashboard-overview">
  <div class="mb-4 dashboard-header">
    <div class="col">
      <h2 class="fw-bold mb-1">Restro Dashboard Overview</h2>
      <p class="text-muted mb-0">
        Welcome back! Here's what's happening today.
      </p>
    </div>
    <div class="col-auto">
      <span class="date-pill">
        <span class="material-symbols-outlined">calendar_month</span>
        {{ today | date: "fullDate" }}
      </span>
    </div>
  </div>

  <!-- KPI Cards -->
  <div class="kpi-grid mb-4">
    <ng-container *ngIf="isLoading">
      <div
        class="skeleton-card kpi-skeleton"
        *ngFor="let s of [1, 2, 3, 4]"
      ></div>
    </ng-container>
    <div class="kpi-card" *ngFor="let kpi of kpis">
      <div class="kpi-card__icon">
        <span class="material-symbols-outlined">{{ kpi.icon }}</span>
      </div>
      <p class="kpi-card__value">{{ kpi.value }}</p>
      <p class="kpi-card__label">{{ kpi.label }}</p>
    </div>
  </div>

  <!-- Charts -->
  <div class="charts-grid">
    <app-chart-card
      class="charts-grid__trend"
      title="Revenue Trend"
      subtitle="Last 7 days performance"
      type="line"
      [labels]="trendLabels"
      [datasets]="trendDatasets"
      [isLoading]="isLoading"
    ></app-chart-card>

    <app-chart-card
      class="charts-grid__status"
      title="Orders by Status"
      subtitle="Live breakdown of current orders"
      type="doughnut"
      [labels]="statusLabels"
      [datasets]="statusDatasets"
      [isLoading]="isLoading"
    ></app-chart-card>

    <app-recent-orders-card
      class="charts-grid__recent-orders"
      title="Recent Orders"
      subtitle="Live order stream"
      [orders]="recentOrders"
      [maxItems]="5"
      [isLoading]="isLoading"
    ></app-recent-orders-card>

    <app-top-dishes-card
      class="charts-grid__top-dishes"
      title="Top 4 Best-Selling Dishes"
      subtitle="Best performers this week"
      [dishes]="topDishes"
      [maxItems]="4"
      [isLoading]="isLoading"
    ></app-top-dishes-card>
  </div>
</div>
