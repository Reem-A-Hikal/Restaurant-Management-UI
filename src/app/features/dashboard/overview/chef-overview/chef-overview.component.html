<div class="container my-4">
  <div class="row align-items-center mb-4">
    <div class="col">
      <h2 class="fw-bold">Kitchen Queue</h2>
      <p class="text-muted mb-0">Orders waiting for preparation</p>
    </div>
  </div>

  <div *ngIf="isLoading" class="text-center py-5">
    <div class="spinner-border text-success"></div>
  </div>

  <div
    *ngIf="!isLoading && kitchenQueue.length === 0"
    class="text-center py-5 text-muted"
  >
    No orders in the queue right now. 🎉
  </div>

  <div class="row g-3" *ngIf="!isLoading && kitchenQueue.length > 0">
    <div class="col-md-4" *ngFor="let order of kitchenQueue">
      <div
        class="card shadow-sm h-100"
        role="button"
        tabindex="0"
        (click)="onViewOrder(order.orderId)"
        (keydown.enter)="onViewOrder(order.orderId)"
        style="cursor: pointer"
      >
        <div class="card-body">
          <h5 class="card-title">{{ order.orderNumber }}</h5>
          <p class="text-muted mb-1">{{ order.statusDisplay }}</p>
          <p class="mb-0">{{ order.orderDetails.length }} items</p>
        </div>
      </div>
    </div>
  </div>
</div>
