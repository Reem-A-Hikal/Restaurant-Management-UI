<div class="my-profile-page container mt-4" *ngIf="!isLoading; else loadingTpl">
  <div class="profile-header">
    <h4>My Profile</h4>
    <p class="text-muted">Manage your personal account information</p>
  </div>

  <div class="my-profile-card">
    <form [formGroup]="profileForm" (ngSubmit)="onSubmit()">
      <!-- Avatar -->
      <div class="my-profile-avatar-section">
        <div class="my-profile-avatar-wrap">
          <img
            [src]="
              imagePreviewUrl ||
              toAssetUrl(
                user.profileImageUrl,
                'assets/images/default-avatar.png'
              )
            "
            [alt]="user.fullName"
            class="my-profile-avatar"
          />
          <label
            class="my-profile-avatar__edit-btn"
            for="ownProfileImage"
            title="Change photo"
            aria-label="Change photo"
          >
            <i class="bi bi-camera-fill"></i>
          </label>
          <input
            id="ownProfileImage"
            type="file"
            accept="image/jpeg,image/png,image/webp"
            (change)="onFileSelected($event)"
            hidden
          />
        </div>
        <div class="my-profile-identity">
          <span class="my-profile-role-badge">{{ user.role }}</span>
          <p class="my-profile-joined">
            Joined {{ user.joinDate | date: "MMM d, y" }}
          </p>
        </div>
      </div>

      <div class="my-profile-divider"></div>

      <!-- Read-only email -->
      <div class="form-field">
        <label class="form-field__label" for="email">Email</label>
        <input
          id="email"
          class="form-field__input"
          type="email"
          [value]="user.email"
          disabled
        />
        <small class="form-field__hint">Email cannot be changed</small>
      </div>

      <!-- Full name -->
      <div
        class="form-field"
        [class.form-field--error]="
          f['fullName'].touched && f['fullName'].invalid
        "
      >
        <label class="form-field__label" for="fullName">Full name</label>
        <input
          class="form-field__input"
          type="text"
          id="fullName"
          formControlName="fullName"
        />
        <div
          class="form-field__error"
          *ngIf="f['fullName'].touched && f['fullName'].invalid"
        >
          <span *ngIf="f['fullName'].errors?.['required']"
            >Full name is required</span
          >
          <span *ngIf="f['fullName'].errors?.['minlength']"
            >Minimum 3 characters</span
          >
        </div>
      </div>

      <!-- Phone -->
      <div
        class="form-field"
        [class.form-field--error]="
          f['phoneNumber'].touched && f['phoneNumber'].invalid
        "
      >
        <label class="form-field__label" for="phoneNumber">Phone number</label>
        <input
          class="form-field__input"
          type="tel"
          id="phoneNumber"
          formControlName="phoneNumber"
          placeholder="01xxxxxxxxx"
        />
        <div
          class="form-field__error"
          *ngIf="f['phoneNumber'].touched && f['phoneNumber'].invalid"
        >
          <span>Please enter a valid phone number</span>
        </div>
      </div>

      <div class="my-profile-actions">
        <button
          type="submit"
          class="btn-save"
          [disabled]="profileForm.invalid || isSaving"
        >
          <span *ngIf="isSaving" class="spinner"></span>
          {{
            isUploadingImage
              ? "Uploading image..."
              : isSaving
                ? "Saving..."
                : "Save changes"
          }}
        </button>
      </div>
    </form>
  </div>
</div>

<ng-template #loadingTpl>
  <div
    class="d-flex justify-content-center align-items-center"
    style="min-height: 300px"
  >
    <div
      class="spinner-border text-success"
      style="width: 2.5rem; height: 2.5rem"
    ></div>
  </div>
</ng-template>
