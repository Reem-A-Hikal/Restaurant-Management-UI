<div class="container mt-4">
  <app-top-page
    pageTitle="Orders"
    pageSubtitle="Track and manage all customer orders"
    [filterOptions]="filterOptions"
    [showAddButton]="false"
    [showSearch]="false"
    (filterChange)="onFilterChange($event)"
    (resetEvent)="onFilterChange('')"
  ></app-top-page>

  <app-order-list
    [orders]="orders"
    [isLoading]="isLoading"
    [allowedRoleActions]="allowedRoleActions"
    (confirm)="onConfirm($event)"
    (markPreparing)="onMarkPreparing($event)"
    (markPrepared)="onMarkPrepared($event)"
    (cancelOrder)="onCancelOrder($event)"
    (viewDetails)="onViewDetails($event)"
  ></app-order-list>
</div>
