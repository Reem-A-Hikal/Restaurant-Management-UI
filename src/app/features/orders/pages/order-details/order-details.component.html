<div class="order-page" *ngIf="!isLoading && order; else loadingTpl">
  <!-- Top bar -->
  <div class="order-page__topbar">
    <button class="back-link" type="button" (click)="goBack()">
      <i class="fas fa-arrow-left"></i> Back to Orders
    </button>

    <div class="order-page__actions">
      <button
        class="btn-pill btn-pill--outline"
        type="button"
        (click)="onPrintReceipt()"
      >
        Print Receipt
      </button>
      <button
        class="btn-pill btn-pill--filled"
        type="button"
        (click)="onTrackDelivery()"
      >
        Track Delivery
      </button>
    </div>
  </div>

  <!-- Header -->
  <div class="order-page__header">
    <div class="order-page__title-row">
      <h1 class="order-page__title">Order Details</h1>
      <app-order-status-badge [status]="order.status"></app-order-status-badge>
    </div>
    <p class="order-page__meta">
      {{ order.orderNumber }} ·
      {{ order.orderDate | date: "MMM d, y, h:mm:ss a" }}
    </p>
  </div>

  <div class="order-page__grid">
    <!-- LEFT COLUMN -->
    <div class="order-page__col-main">
      <app-order-summary-panel [order]="order"></app-order-summary-panel>

      <app-order-logistics-panel
        *ngIf="canSeeDeliveryLogistics"
        [orderId]="orderId"
        [order]="order"
        [delivery]="delivery"
        [deliveriesHistory]="deliveriesHistory"
        [isLoading]="isLoadingDelivery || isLoadingHistory"
        (deliveryAssigned)="onDeliveryAssigned($event)"
      ></app-order-logistics-panel>
    </div>

    <!-- RIGHT COLUMN -->
    <div class="order-page__col-side">
      <app-order-customer-panel
        [order]="order"
        (viewHistory)="onViewOrderHistory()"
      ></app-order-customer-panel>

      <app-order-payment-panel
        *ngIf="canSeePayments"
        [payments]="payments"
        [isLoading]="isLoadingPayments"
        [isRefunding]="isRefunding"
        [staffNotes]="order.staffNotes"
        (refund)="onRefund()"
      ></app-order-payment-panel>

      <app-order-actions-panel
        *ngIf="visibleActions.length > 0"
        [visibleActions]="visibleActions"
        [isProcessing]="isProcessingAction"
        (confirm)="onConfirm()"
        (markPreparing)="onMarkPreparing()"
        (markPrepared)="onMarkPrepared()"
        (cancelOrder)="onCancel()"
      ></app-order-actions-panel>
    </div>
  </div>
</div>

<ng-template #loadingTpl>
  <div
    class="d-flex justify-content-center align-items-center"
    style="min-height: 300px"
  >
    <div class="text-center">
      <div
        class="spinner-border text-success mb-2"
        style="width: 2.5rem; height: 2.5rem"
      ></div>
      <div><small class="text-muted">Loading order...</small></div>
    </div>
  </div>
</ng-template>
