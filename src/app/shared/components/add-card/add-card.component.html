<button class="add-card" type="button" (click)="onClick()">
  <div class="add-card__icon-wrapper">
    <span class="material-symbols-outlined add-card__icon">{{ symbol }}</span>
  </div>
  <h3 class="add-card__title">Add New {{ title }}</h3>
  <p class="add-card__subtitle">
    {{subtitle}}
  </p>
</button>
